name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # For OIDC auth (recommended)

env:
  AZURE_WEBAPP_NAME: app-scus-cuusa-web-001         # e.g. xcu-webapp-scus
  AZURE_WEBAPP_PACKAGE_PATH: '.'                 # Root of repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'                  # Cache npm for faster runs

      - name: Install production dependencies
        run: |
          npm ci --production --no-audit --prefer-offline

      - name: Login to Azure (OIDC - preferred, no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_48CB96D8FD9D41B6BB8D0F2975C51DAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D08DD9B6251433F9A89FA707502C253 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_015A1106D1A148A081EE39158055B1BF }}

      - name: Set startup command to node app.js
        run: az webapp config set --name app-scus-cuusa-web-001--resource-group rg-scus-cuusa-web-001 --startup-file "node app.js"

      - name: Create deployment package (includes node_modules)
        run: |
          zip -r deploy.zip . -x "*.git*" "*/node_modules/.cache/*" "*.env*" "README.md" ".github/*" ".vscode/*"

      # Alternative: Use publish-profile if you prefer (store as secret AZURE_WEBAPP_PUBLISH_PROFILE)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-scus-cuusa-web-001
          package: deploy.zip
          # slot-name: production   # uncomment if using slots

      - name: Restart App Service (ensure clean start)
        run: az webapp restart --name app-scus-cuusa-web-001 --resource-group rg-scus-cuusa-web-001