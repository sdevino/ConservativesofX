name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # For OIDC auth (recommended)

env:
  AZURE_WEBAPP_NAME: your-app-name-here          # e.g. xcu-webapp-scus
  AZURE_WEBAPP_PACKAGE_PATH: '.'                 # Root of repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'                  # Cache npm for faster runs

      - name: Install production dependencies
        run: |
          npm ci --production --no-audit --prefer-offline

      - name: Login to Azure (OIDC - preferred, no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C476DDFAA0674F1B9A513DF4C93BA7B1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_73AC0748DB6F4C5CAE4FFFE28B8C062E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_895823B8664A4A48B9C68421E9FC8D1D }}

      - name: Set startup command to node app.js
        run: az webapp config set --name app-scus-conservatives-web-001 --resource-group rg-scus-conservatives-web-001 --startup-file "node app.js"

      - name: Create deployment package (includes node_modules)
        run: |
          zip -r deploy.zip . -x "*.git*" "*/node_modules/.cache/*" "*.env*" "README.md"

      # Alternative: Use publish-profile if you prefer (store as secret AZURE_WEBAPP_PUBLISH_PROFILE)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-scus-conservatives-web-001'
          package: deploy.zip
          # slot-name: production   # uncomment if using slots

      - name: Restart App Service (ensure clean start)
        run: az webapp restart --name app-scus-conservatives-web-001 --resource-group rg-scus-conservatives-web-001