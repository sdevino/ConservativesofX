name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: app-scus-cuusa-web-001
  AZURE_RESOURCE_GROUP: rg-scus-cuusa-web               # ← CHANGE THIS IF YOUR RG NAME IS DIFFERENT

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --production --no-audit --prefer-offline || npm install --production --no-audit --prefer-offline

      - name: Create deployment package (includes node_modules + public)
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
               "*/node_modules/.cache/*" \
               "*.env*" \
               "README.md" \
               ".github/*" \
               ".vscode/*"

      - name: Login to Azure using Service Connection
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_48CB96D8FD9D41B6BB8D0F2975C51DAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D08DD9B6251433F9A89FA707502C253 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_015A1106D1A148A081EE39158055B1BF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy.zip
          slot-name: production

      - name: Restart Web App
        run: |
          az webapp restart \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Show deployment status
        run: echo "✅ Deployment completed successfully to app-scus-cuusa-web-001"