name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: app-scus-cuusa-web-001
  AZURE_RESOURCE_GROUP: rg-scus-cuusa-web-001

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --production --no-audit --prefer-offline || npm install --production --no-audit --prefer-offline

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
               "**/.git/**" \
               "**/node_modules/.cache/**" \
               "*.env*" \
               "README.md" \
               ".github/**" \
               ".vscode/**"

      - name: Verify package contents
        run: |
          echo "=== Files in deploy.zip ==="
          unzip -l deploy.zip | grep -E "(package.json|app.js|public/style.css|views/layout.ejs|views/home.ejs)"
          echo "============================================"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_48CB96D8FD9D41B6BB8D0F2975C51DAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D08DD9B6251433F9A89FA707502C253 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_015A1106D1A148A081EE39158055B1BF }}

      - name: Deploy package to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy.zip
          slot-name: production

      - name: Force clean old package and restart
        run: |
          echo "Cleaning old package cache..."
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=1

          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }}

      - name: Deployment Status
        run: echo "✅ Deployment completed. Check Log stream for new files."